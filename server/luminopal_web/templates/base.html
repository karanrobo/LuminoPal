{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        LuminoPal
        {% endblock %}
    </title>


    <!-- Bootstrap CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >


    <!-- Custom global CSS -->
    <link 
        rel="stylesheet" 
        href="{% static 'webapp/css/style.css' %}"
    >


    {% block extra_head %}
    {% endblock %}

</head>


<body class="bg-light">


    {% block content %}
    {% endblock %}



    <!-- Bootstrap JS -->
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
        
    </script>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    {% block extra_scripts %}
    {% endblock %}


</body>

</html>
