
{% for timer in timers %}

<div class="modal fade"
     id="timerModal{{ timer.id }}"
     tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <form method="POST"
                  action="{% url 'edit_timer' timer.id %}">

                {% csrf_token %}

                <div class="modal-header">

                    <h5>Edit Timer</h5>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <input
                        class="form-control mb-3"
                        name="title"
                        value="{{ timer.title }}">

                    <select
                        class="form-select"
                        name="status">

                        {% for value,label in timer.STATUS_CHOICES %}

                        <option
                            value="{{ value }}"
                            {% if timer.status == value %}selected{% endif %}>

                            {{ label }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="modal-footer">

                    <button class="btn btn-primary">

                        Save Changes

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endfor %}
