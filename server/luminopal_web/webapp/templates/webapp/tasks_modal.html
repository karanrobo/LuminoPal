{% for task in tasks %}

<div class="modal fade"
     id="taskModal{{ task.id }}"
     tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <form method="POST"
                  action="{% url 'edit_task' task.id %}">

                {% csrf_token %}

                <div class="modal-header">

                    <h5>Edit Task</h5>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <input
                        class="form-control mb-3"
                        name="title"
                        value="{{ task.title }}">

                    <textarea
                        class="form-control"
                        rows="5"
                        name="description">{{ task.description }}</textarea>

                </div>

                <div class="modal-footer">

                    <button class="btn btn-primary">

                        Save Changes

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>
{% endfor %}
