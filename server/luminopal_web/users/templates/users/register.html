{% extends "base.html" %}

{% block title %}
Register | LuminoPal
{% endblock %}


{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">


            <div class="card shadow">

                <div class="card-body">


                    <h2 class="text-center mb-4">
                        Create Account
                    </h2>



                    <form method="POST">

                        {% csrf_token %}


                        {{ form.as_p }}



                        <button class="btn btn-success w-100 mt-3">
                            Register
                        </button>


                    </form>

                    <div class="text-center mt-3">


                        <p class="mb-1">
                            Already have an account? 
                            <a href="{% url 'login' %}">
                                Login
                            </a>
                        </p>
                    </div>

                </div>

            </div>


        </div>

    </div>

</div>


{% endblock %}
